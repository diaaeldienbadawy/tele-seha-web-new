@if(data){
  <div class="py-4">
    <div class="container mx-auto px-4">
      <div class="ts-card border border-slate-100 hover:border-(--primary-color)/20 shadow-md">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
          <div class="space-y-4">
            <div class="flex items-center gap-3">
              <i class="fa-regular fa-calendar text-(--primary-color) text-2xl md:text-3xl"></i>
              <h3 class="text-(--primary-color) text-xl md:text-2xl font-bold">
                {{ 'patientHome.recentTitle' | translate }}
              </h3>
            </div>
            
            <div class="space-y-2">
              <p class="text-slate-700 text-sm sm:text-base md:text-lg font-semibold">
                {{ 'patientHome.upcomingCount' | translate: { count: data?.count } }}
              </p>
              <p class="text-[#0068A1] text-sm sm:text-base md:text-lg font-bold flex items-center gap-2">
                <i class="fa-regular fa-clock text-base shrink-0"></i>
                <span>{{ 'patientHome.nextAppt' | translate: { minutes: getRemainingMinutes(data?.next_date_time) } }}</span>
              </p>
              <p class="text-slate-500 text-xs sm:text-sm md:text-base font-normal">
                {{ 'patientHome.viewDetails' | translate }}
              </p>
            </div>
          </div>

          <div class="w-full md:w-auto">
            <button type="button" routerLink="/patient/allResent"
              class="ts-btn-primary w-full md:w-auto px-6 py-3.5 text-sm sm:text-base font-bold flex items-center justify-center gap-2 cursor-pointer">
              <span>{{ 'patientHome.viewBtn' | translate }}</span>
              <i class="fa-solid fa-arrow-right text-xs"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
}
