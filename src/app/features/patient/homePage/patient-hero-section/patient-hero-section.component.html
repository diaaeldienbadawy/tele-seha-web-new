<section class="min-h-screen relative overflow-hidden  lg:border-b-[0.5px] border-b-[#BCBCBC] ">


  <div class="container">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center mt-[100px] ">

      <div class=" w-full md:w-[90%] relative text-center md:text-left ">

        <img class="absolute top-[-70%] left-[-15%] z-[-1] hidden lg:block " src="assets/images/Eclipse.svg"
          loading="lazy" alt="img">
        <img class="absolute top-[-20%] md:top-[-20%] lg:top-[-30%] left-[10%]  w-[13%] md:w-[12%] z-[-1] "
          src="assets/images/circle sec-.svg" loading="lazy" alt="img">
        <img class="absolute top-[-20%] md:top-[-20%] lg:top-[-50%] right-[10%]  w-[13%] md:w-[15%] z-[-1]"
          src="assets/images/circle sec-.png" loading="lazy" alt="img">
        <img class="absolute top-[-10%] lg:top-[-20%]  right-[40%] z-[-1] lg:right-[35%]"
          src="assets/images/Vector (1).png" loading="lazy" alt="img">




        <h2 class="text-slate-800 text-[22px] md:text-[26px] lg:text-[36px] font-extrabold leading-[135%] tracking-tight">
          {{ 'patientHome.welcome' | translate: { name: name } }}
        </h2>

        <p class="my-6 text-slate-500 text-base lg:text-lg font-normal leading-relaxed">
          {{ 'patientHome.subtitle' | translate }}
        </p>
        <div class="flex justify-center md:justify-start gap-4 relative z-[2]">
          <button routerLink="/patient/allDoctors"
            class="ts-btn-primary w-full sm:w-auto px-8 py-4 text-base md:text-lg font-bold shadow-lg shadow-(--primary-color)/25 hover:shadow-xl hover:shadow-(--primary-color)/35 hover:-translate-y-0.5 active:translate-y-0 transition-all duration-300 ease-in-out cursor-pointer">
            {{ 'patientHome.bookBtn' | translate }}
          </button>
        </div>
      </div>
      <div class="image w-fit mx-auto relative">

        <img class="absolute top-[-30%] right-[-17%] z-[-1] hidden lg:block " src="assets/images/Eclipse (1).svg"
          loading="lazy" alt="img">
        <img class="absolute top-[-8%] right-[50%] -rotate-45 hidden lg:block " src="assets/images/Vector (1).png"
          loading="lazy" alt="img">
        <img class="absolute w-[96%] top-[-2%] right-[1%]  " src="assets/images/Vector 11.png" loading="lazy" alt="img">
        <img class="absolute w-full bottom-[5px] right-[-2%]  " src="assets/images/Vector 12.png" loading="lazy"
          alt="img">


        <img class="w-full mx-auto imgHero " loading="lazy" src="/assets/images/Group 76648.svg" alt="img">
      </div>

    </div>

  </div>

</section>
