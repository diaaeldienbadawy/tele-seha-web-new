<app-patient-report-hero-section></app-patient-report-hero-section>

<!-- Content Header -->
<section class="py-12 bg-slate-50/20">
  <div class="container mx-auto px-4 max-w-4xl text-center">
    <div class="max-w-2xl mx-auto space-y-4">
      <h2 class="text-slate-800 text-2xl sm:text-3xl md:text-4xl font-extrabold tracking-tight">
        {{ 'reports.title' | translate }}
      </h2>
      <div class="w-16 h-1 bg-gradient-to-r from-(--primary-color) to-teal-500 mx-auto rounded-full"></div>
      <p class="text-slate-700 text-sm sm:text-base md:text-lg font-bold leading-relaxed">
        {{ 'reports.subtitle' | translate }}
      </p>
      <p class="text-slate-400 text-xs sm:text-sm font-medium leading-relaxed">
        {{ 'reports.description' | translate }}
      </p>
    </div>
  </div>
</section>

<!-- Report Tabs & Tables -->
<section class="pb-16 pt-2">
  <div class="container mx-auto px-4 max-w-5xl">
    <!-- Tabs Header -->
    <div class="flex border-b border-slate-100 mb-8 overflow-x-auto no-scrollbar gap-2 justify-center">
      <button 
        (click)="activeTab = 'tab1'" 
        [ngClass]="activeTab === 'tab1'
          ? 'text-(--primary-color) border-(--primary-color) font-extrabold'
          : 'text-slate-400 border-transparent hover:text-slate-600 font-semibold'" 
        class="px-6 py-4 text-sm sm:text-base md:text-lg transition-all duration-300 border-b-2 whitespace-nowrap cursor-pointer"
      >
        <i class="fa-regular fa-file-lines mr-2 rtl:ml-2"></i>
        {{ 'reports.prescriptions' | translate }}
      </button>

      <button 
        (click)="activeTab = 'tab2'" 
        [ngClass]="activeTab === 'tab2'
          ? 'text-(--primary-color) border-(--primary-color) font-extrabold'
          : 'text-slate-400 border-transparent hover:text-slate-600 font-semibold'" 
        class="px-6 py-4 text-sm sm:text-base md:text-lg transition-all duration-300 border-b-2 whitespace-nowrap cursor-pointer"
      >
        <i class="fa-solid fa-x-ray mr-2 rtl:ml-2"></i>
        {{ 'reports.radiology' | translate }}
      </button>

      <button 
        (click)="activeTab = 'tab3'" 
        [ngClass]="activeTab === 'tab3'
          ? 'text-(--primary-color) border-(--primary-color) font-extrabold'
          : 'text-slate-400 border-transparent hover:text-slate-600 font-semibold'" 
        class="px-6 py-4 text-sm sm:text-base md:text-lg transition-all duration-300 border-b-2 whitespace-nowrap cursor-pointer"
      >
        <i class="fa-solid fa-vial mr-2 rtl:ml-2"></i>
        {{ 'reports.labTests' | translate }}
      </button>
    </div>

    <!-- Tab Content -->
    <div class="bg-white rounded-3xl border border-slate-100 p-6 md:p-8 ts-card">
      @if (activeTab === 'tab1') {
      <div class="animate-fadeIn">
        <app-patient-report-prescriptions-section></app-patient-report-prescriptions-section>
      </div>
      }

      @if (activeTab === 'tab2') {
      <div class="animate-fadeIn">
        <app-patient-report-radiology-section></app-patient-report-radiology-section>
      </div>
      }
      
      @if (activeTab === 'tab3') {
      <div class="animate-fadeIn">
        <app-patient-report-lab-tests-section></app-patient-report-lab-tests-section>
      </div>
      }
    </div>
  </div>
</section>
