<div class="p-0 h-screen">

  <div class="flex justify-between items-center h-full">

    <!-- left Side -->
    <div class="w-[50%] h-full hidden md:block">
      <!-- <app-left-side></app-left-side> -->
      <app-auth-left-side></app-auth-left-side>


    </div>

    <!-- Right Side -->
    <div class="w-full md:w-[50%] p-[20px] sm:p-[30px] h-screen flex flex-col">

      <!-- Header Logo  -->
      <div class="w-full h-fit flex items-center justify-between">
        <div class="w-[25px]"></div>
        <app-auth-logo></app-auth-logo>
        <i class="fa-solid fa-xmark text-[#899CC9] text-[25px] cursor-pointer" (click)="clearLocalStorage()">
        </i>
      </div>


      <!-- Content Centered Vertically -->
      <div class="flex-1 flex flex-col justify-center w-[95%] md:w-[70%] mx-auto">

        <div
          class="w-full border border-(--border-color) md:border-none rounded-[20px] p-[20px] sm:px-[30px] sm:py-[60px] md:p-0">

          <h2 class="text-(--text-color) text-[32px] font-bold leading-[100%]">
            {{ 'auth.loginTo' | translate }}
          </h2>


          <div class="flex flex-col gap-[20px] mt-[20px]">

            @for (patient of patients; track $index) {
            <div class="bg-[#FFFFFF] shadow-[0px_2px_8px_0px_#DADADA80] rounded-[20px] p-[20px]
              flex justify-between items-center gap-[15px] cursor-pointer">

              <div class="flex items-center gap-[12px]">
                <img class="w-[30px] h-[30px] rounded-full" src="assets/images/Group 1000005886.svg" alt="">

                <h3 class="text-(--text-color) text-[18px] font-semibold">
                  {{ patient.name }}
                </h3>
              </div>

              <div class="w-fit">
                <button (click)="selectProfile(patient)" class="bg-[#007BBD] text-white px-[15px] py-[5px]
                  rounded-[10px] text-[16px] font-medium transition-colors hover:bg-[#005e91]">
                  {{ 'auth.login' | translate }}
                </button>
              </div>

            </div>
            }

          </div>


        </div>

      </div>

    </div>

  </div>

</div>
