<div class="mt-8">
  <div class="ts-card border border-slate-100 bg-white p-6 md:p-10 max-w-xl mx-auto rounded-3xl">
    
    <!-- Title -->
    <div class="text-center mb-8 pb-4 border-b border-slate-50">
      <h3 class="text-slate-800 text-xl font-extrabold flex items-center justify-center gap-2">
        <i class="fa-solid fa-shield-halved text-(--primary-color)"></i>
        {{ 'patientProfile.privacySecurity' | translate }}
      </h3>
    </div>

    <!-- Mobile Number Update Form -->
    @if(!showOtpForm){
      
      @if(!showDisableBtn){
      <div class="mb-4 text-right rtl:text-left">
        <button 
          (click)="closeMobileEdit()" 
          class="ts-btn-secondary px-6 py-2 text-xs font-bold transition-all cursor-pointer"
        >
          {{ 'patientProfile.cancel' | translate }}
        </button>
      </div>
      }

      <form [formGroup]="mobileForm" class="space-y-4">
        <div class="flex flex-col gap-2">
          <label class="text-slate-700 font-bold text-xs uppercase tracking-wider">
            {{ 'support.phone' | translate }}
          </label>
          <div class="relative flex items-center gap-3">
            <div class="relative flex-1 flex items-center">
              <i class="fa-solid fa-phone absolute left-4 text-slate-400 text-sm"></i>
              <input 
                type="text" 
                formControlName="mobile" 
                [disabled]="showDisableBtn"
                class="ts-input pl-10 pr-4 py-3 disabled:bg-slate-50 disabled:text-slate-400 disabled:border-slate-100" 
              />
            </div>
            
            <button 
              type="button" 
              (click)="toggleMobileEdit()" 
              class="ts-btn-primary px-8 py-3 text-sm font-bold shadow-md shadow-blue-500/10 hover:shadow-lg transition-all cursor-pointer"
            >
              {{ (showDisableBtn ? 'patientProfile.edit' : 'patientProfile.save') | translate }}
            </button>
          </div>
        </div>
      </form>
    }

    <!-- OTP Code Verification -->
    @if(showOtpForm){
    <div class="w-full max-w-md mx-auto space-y-6">
      <div class="text-center space-y-1">
        <h4 class="text-slate-700 text-base font-extrabold">
          Enter Verification Code
        </h4>
        <p class="text-slate-400 text-xs font-semibold">
          We sent a 6-digit code to your phone
        </p>
      </div>

      <form [formGroup]="otpForm" class="space-y-6">
        <!-- OTP Inputs -->
        <div class="flex justify-between items-center gap-2">
          <div *ngFor="let c of controls; let i = index">
            <div
              [ngClass]="{
                'border-(--primary-color) bg-blue-50/25 ring-2 ring-blue-500/10': otpArray[i],
                'border-rose-500 bg-rose-50/25': showError,
                'border-slate-200 bg-slate-50/50': !otpArray[i] && !showError
              }"
              class="rounded-2xl w-11 h-11 sm:w-14 sm:h-14 flex items-center justify-center border-2 transition-all duration-300"
            >
              <input 
                type="text" 
                maxlength="1" 
                class="text-slate-800 text-lg sm:text-xl font-extrabold bg-transparent w-full text-center outline-none" 
                (input)="onInput($event, i)"
                (keydown)="onKeyDown($event, i)" 
                #otpInput
              />
            </div>
          </div>
        </div>

        <!-- Error Message -->
        <p *ngIf="showError" class="text-rose-500 text-xs font-bold flex items-center gap-1.5 justify-center">
          <i class="fa-solid fa-circle-exclamation text-sm"></i>
          {{ 'patientProfile.invalidOtp' | translate }}
        </p>

        <!-- Verify CTA -->
        <div class="pt-2">
          <button 
            type="button" 
            (click)="submitOtp()" 
            class="ts-btn-primary w-full py-3.5 text-base font-bold shadow-lg shadow-blue-500/10 hover:shadow-lg transition-all cursor-pointer"
          >
            {{ 'patientProfile.verify' | translate }}
          </button>
        </div>

        <!-- Timer -->
        <div class="text-center">
          <span class="text-slate-400 text-xs font-bold uppercase tracking-wider flex items-center justify-center gap-1.5">
            <i class="fa-regular fa-clock text-slate-400"></i>
            {{ 'patientProfile.resendCode' | translate:{time: '00:30'} }}
          </span>
        </div>

      </form>
    </div>
    }

  </div>
</div>
