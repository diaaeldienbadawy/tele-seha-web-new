<div class="p-0 min-h-screen bg-slate-50 font-sans">
  
  <!-- Top Navigation -->
  <div class="w-full bg-white shadow-sm border-b border-slate-200 px-6 py-4 flex items-center justify-between z-20 relative">
    <app-auth-logo></app-auth-logo>
    <div class="flex items-center gap-2">
      <div class="w-2 h-2 rounded-full bg-(--primary-color) animate-pulse"></div>
      <span class="text-sm font-bold text-slate-600">Step 4 of 4</span>
    </div>
  </div>

  <div class="max-w-[1200px] mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 md:py-12">
    <div class="mb-8 text-center sm:text-left">
      <h2 class="text-slate-800 text-[28px] sm:text-[36px] font-extrabold tracking-tight">Schedule Appointments</h2>
      <p class="text-slate-500 text-[15px] sm:text-[16px] mt-2">Define your availability hours for patient consultations.</p>
    </div>

    <!-- Modern Segmented Control (Tabs) -->
    <div class="flex justify-center sm:justify-start mb-8">
      <div class="inline-flex bg-slate-200/60 p-1.5 rounded-2xl border border-slate-200 w-full sm:w-auto">
        <button (click)="activeTab = 'tab1'" 
          class="flex-1 sm:flex-none px-4 sm:px-8 py-2.5 rounded-xl font-bold text-[14px] sm:text-[15px] transition-all duration-300"
          [ngClass]="activeTab === 'tab1' ? 'bg-white text-(--primary-color) shadow-sm' : 'text-slate-600 hover:text-slate-800'">
          <i class="fa-solid fa-rotate-right mr-1.5"></i> Recurring
        </button>
        <button (click)="activeTab = 'tab2'" 
          class="flex-1 sm:flex-none px-4 sm:px-8 py-2.5 rounded-xl font-bold text-[14px] sm:text-[15px] transition-all duration-300"
          [ngClass]="activeTab === 'tab2' ? 'bg-white text-(--primary-color) shadow-sm' : 'text-slate-600 hover:text-slate-800'">
          <i class="fa-regular fa-calendar mr-1.5"></i> Non-Recurring
        </button>
      </div>
    </div>

    <!-- Tab Content Area -->
    <div class="animate-fadeIn">
      @if (activeTab === 'tab1') {
        <app-recurring-appointments></app-recurring-appointments>
      }

      @if (activeTab === 'tab2') {
        <app-non-recurring-appointments></app-non-recurring-appointments>
      }
    </div>

    <!-- Footer -->
    <div class="w-full text-center text-xs text-slate-400 mt-12 pb-6">
      &copy; 2026 teleSEHA. All rights reserved.
    </div>

  </div>
</div>
