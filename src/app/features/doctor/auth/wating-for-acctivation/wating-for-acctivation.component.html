<div class="p-0 h-screen bg-[#F8FAFC]">

  <div class="flex justify-between items-center h-full">

    <!-- left Side -->
    <div class="w-[50%] h-full hidden md:block">
      <!-- <app-left-side></app-left-side> -->
      <app-auth-left-side></app-auth-left-side>
    </div>

    <!-- Right Side -->
    <div class="w-full md:w-[50%] p-[20px] sm:p-[30px] h-screen flex flex-col relative overflow-hidden">
      
      <!-- Ambient Background Shapes for Premium Feel -->
      <div class="absolute top-[-10%] right-[-10%] w-[300px] h-[300px] rounded-full bg-gradient-to-br from-[#007BBD]/10 to-[#00A6E0]/5 blur-3xl animate-float"></div>
      <div class="absolute bottom-[10%] left-[-10%] w-[250px] h-[250px] rounded-full bg-gradient-to-tr from-[#007BBD]/10 to-transparent blur-3xl animate-float" style="animation-delay: 2s;"></div>

      <!-- Header Logo  -->
      <div class="w-full h-fit flex items-center justify-between relative z-10">
        <div class="w-[25px]"></div>
        <app-auth-logo></app-auth-logo>
        <i class="fa-solid fa-xmark text-[#899CC9] text-[25px] cursor-pointer transition-transform hover:rotate-90 hover:text-[#007BBD]" (click)="clearLocalStorage()">
        </i>
      </div>


      <!-- Content Centered Vertically -->
      <div class="flex-1 flex flex-col justify-center w-[95%] md:w-[80%] lg:w-[70%] mx-auto relative z-10">

        <div class="w-full bg-white/70 backdrop-blur-xl border border-white md:border-none md:shadow-2xl md:shadow-[#007BBD]/5 rounded-[30px] p-[30px] sm:p-[40px] transition-all duration-500 hover:shadow-3xl hover:bg-white/90">

          <div class="text-center">
            
            <!-- Success Icon -->
            <div class="flex justify-center mb-[20px] relative">
              <div class="pulse-ring absolute inset-0 rounded-full w-[140px] h-[140px] mx-auto opacity-50 bg-[#10B981]/20"></div>
              <div class="w-[140px] h-[140px] bg-gradient-to-tr from-[#10B981] to-[#34D399] rounded-full shadow-lg border-[4px] border-white z-10 relative animate-float-slow flex items-center justify-center">
                <svg class="w-[70px] h-[70px] text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                </svg>
              </div>
            </div>

            <h3 class="text-[#1E1E1E] text-[28px] sm:text-[32px] font-extrabold leading-[120%] mb-[15px]">
              <span class="bg-gradient-to-r from-[#007BBD] to-[#005A8C] bg-clip-text text-transparent">Waiting for Activation</span>
            </h3>

            <p class="text-[#4A5568] text-[16px] sm:text-[18px] font-medium leading-[160%] mt-[10px]">
              We are reviewing your profile and certificates. Please check back within 2 days to track your activation status.
            </p>

            <div class="mt-[15px] p-[15px] bg-[#F0F7FA] rounded-[15px] flex items-start text-left">
              <i class="fa-solid fa-circle-info text-[#007BBD] mt-[3px] mr-[10px] text-[18px]"></i>
              <p class="text-[#4A5568] text-[14px] font-medium leading-[150%]">
                If you have any questions or your account takes longer to activate, please contact our support team.
              </p>
            </div>

            <div class="mt-[35px]">
              <button (click)="clearLocalStorage()"
              class="group relative overflow-hidden bg-gradient-to-r from-[#007BBD] to-[#00669E] w-full p-[16px] rounded-[15px] text-[#FFFFFF] text-[18px] sm:text-[20px] font-bold shadow-lg transition-all hover:shadow-[#007BBD]/40 active:scale-95 flex items-center justify-center gap-3">
                <span class="relative z-10">Back To Home</span>
                <i class="fa-solid fa-arrow-right relative z-10 transition-transform group-hover:translate-x-2"></i>
                <!-- Shine effect -->
                <div class="absolute top-0 -inset-full h-full w-1/2 z-5 block transform -skew-x-12 bg-gradient-to-r from-transparent to-white opacity-20 group-hover:animate-shine"></div>
              </button>
            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
